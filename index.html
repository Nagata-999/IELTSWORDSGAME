<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>IELTS Speed Vocab Game</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --panel: rgba(255,255,255,0.10);
      --panel-strong: rgba(255,255,255,0.16);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #38bdf8;
      --good: #22c55e;
      --bad: #ef4444;
      --warn: #f59e0b;
      --bomb: #fb7185;
      --shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1d4ed8 0%, var(--bg1) 45%, #020617 100%);
      color: var(--text);
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    .app {
      width: 100%;
      max-width: 520px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 10px;
    }

    .panel {
      background: var(--panel);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .topbar {
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .stat {
      background: rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 10px 8px;
      text-align: center;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
    }

    .combo-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4px;
      gap: 8px;
      margin-top: 6px;
      font-size: 14px;
      color: var(--muted);
    }

    .combo-value {
      color: #fef08a;
      font-weight: 700;
    }

    .question-card {
      padding: 16px 14px;
      text-align: center;
    }

    .question-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .question-text {
      font-size: clamp(26px, 6vw, 38px);
      font-weight: 900;
      letter-spacing: 0.02em;
      min-height: 48px;
    }

    .feedback {
      min-height: 24px;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      color: var(--muted);
    }

    .feedback.good { color: #bbf7d0; }
    .feedback.bad { color: #fecaca; }
    .feedback.warn { color: #fde68a; }

    .arena {
      position: relative;
      flex: 1;
      min-height: 320px;
      overflow: hidden;
      padding: 8px;
    }

    .balloon {
      position: absolute;
      border: none;
      border-radius: 999px;
      padding: 14px 18px;
      min-width: 92px;
      max-width: 42vw;
      font-size: 18px;
      font-weight: 800;
      color: #082f49;
      background: linear-gradient(180deg, #e0f2fe 0%, #7dd3fc 100%);
      box-shadow: 0 10px 20px rgba(14,165,233,0.25);
      cursor: pointer;
      transform: translate3d(0,0,0);
      transition: transform 0.08s ease, filter 0.15s ease, opacity 0.15s ease;
      user-select: none;
      touch-action: manipulation;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .balloon:active {
      transform: scale(0.96);
    }

    .balloon.correct-flash {
      background: linear-gradient(180deg, #dcfce7 0%, #4ade80 100%);
      color: #14532d;
    }

    .balloon.wrong-flash {
      background: linear-gradient(180deg, #fee2e2 0%, #f87171 100%);
      color: #7f1d1d;
    }

    .balloon.bomb {
      background: linear-gradient(180deg, #ffe4e6 0%, #fb7185 100%);
      color: #881337;
      box-shadow: 0 10px 20px rgba(244,63,94,0.25);
    }

    .bottom {
      padding: 12px;
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 800;
      color: white;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    .btn.primary {
      background: linear-gradient(180deg, #2563eb 0%, #1d4ed8 100%);
    }

    .btn.secondary {
      background: linear-gradient(180deg, #475569 0%, #334155 100%);
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(2,6,23,0.72);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 10;
    }

    .modal {
      width: min(100%, 420px);
      padding: 20px;
      border-radius: 22px;
      background: rgba(15,23,42,0.88);
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .modal h1, .modal h2 {
      margin: 0 0 10px;
    }

    .modal p {
      color: var(--muted);
      line-height: 1.55;
      margin: 8px 0;
    }

    .result-grid {
      margin: 14px 0 18px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .result-box {
      padding: 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
    }

    .result-box .k {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .result-box .v {
      font-size: 24px;
      font-weight: 900;
    }

    .small {
      font-size: 13px;
      color: var(--muted);
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 420px) {
      .app { padding: 10px; gap: 8px; }
      .balloon { font-size: 16px; padding: 12px 14px; min-width: 84px; }
      .question-text { font-size: 28px; }
      .stat-value { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel topbar">
      <div>
        <div class="stat">
          <div class="stat-label">Score</div>
          <div class="stat-value" id="scoreValue">0</div>
        </div>
      </div>
      <div>
        <div class="stat">
          <div class="stat-label">Time</div>
          <div class="stat-value" id="timeValue">60.0</div>
        </div>
      </div>
      <div>
        <div class="stat">
          <div class="stat-label">Combo</div>
          <div class="stat-value" id="comboValue">x0</div>
        </div>
      </div>
      <div class="combo-line" style="grid-column:1 / -1;">
        <div>3秒以内でコンボ継続</div>
        <div><span class="combo-value" id="comboTimerValue">-</span></div>
      </div>
    </div>

    <div class="panel question-card">
      <div class="question-label">日本語に合う英単語をタップ</div>
      <div class="question-text" id="questionText">準備OK？</div>
    </div>

    <div class="feedback" id="feedbackText">Start を押してスタート</div>

    <div class="panel arena" id="arena"></div>

    <div class="panel bottom">
      <button class="btn primary" id="startBtn">Start</button>
      <button class="btn secondary" id="retryBtn">Retry</button>
    </div>
  </div>

  <div class="overlay" id="startOverlay">
    <div class="modal">
      <h1>IELTS Speed Vocab</h1>
      <p></p>
      <div style="margin-top:16px; display:flex; gap:10px;">
        <button class="btn primary" id="startOverlayBtn">ゲーム開始</button>
      </div>
    </div>
  </div>

  <div class="overlay hidden" id="resultOverlay">
    <div class="modal">
      <h2>Time Up!</h2>
      <div class="result-grid">
        <div class="result-box">
          <div class="k">Final Score</div>
          <div class="v" id="finalScore">0</div>
        </div>
        <div class="result-box">
          <div class="k">Accuracy</div>
          <div class="v" id="finalAccuracy">0%</div>
        </div>
        <div class="result-box">
          <div class="k">Correct</div>
          <div class="v" id="finalCorrect">0</div>
        </div>
        <div class="result-box">
          <div class="k">Max Combo</div>
          <div class="v" id="finalMaxCombo">0</div>
        </div>
      </div>
      <p class="small">この版はまず動く最小版です。次に Supabase をつなげればランキング化できます。</p>
      <div style="margin-top:16px; display:flex; gap:10px;">
        <button class="btn primary" id="playAgainBtn">もう一回</button>
      </div>
    </div>
  </div>

  <script>
    let audioCtx = null;

    function ensureAudio() {
      if (!audioCtx) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (Ctx) audioCtx = new Ctx();
      }
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    function playTone(freq, duration = 0.08, type = 'sine', volume = 0.04, slideTo = null) {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, now);
      if (slideTo) {
        osc.frequency.exponentialRampToValueAtTime(slideTo, now + duration);
      }
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(volume, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + duration + 0.02);
    }

    function soundCorrect() {
      playTone(740, 0.08, 'triangle', 0.05, 880);
    }

    function soundCombo(combo) {
      if (combo < 2) return;
      playTone(880, 0.06, 'triangle', 0.045, 1175);
      setTimeout(() => playTone(1175, 0.06, 'triangle', 0.04, 1480), 55);
    }

    function soundWrong() {
      playTone(220, 0.12, 'sawtooth', 0.04, 160);
    }

    function soundBomb() {
      playTone(180, 0.16, 'square', 0.05, 80);
      setTimeout(() => playTone(120, 0.18, 'sawtooth', 0.04, 60), 70);
    }

    function soundCountdown() {
      playTone(980, 0.05, 'square', 0.025);
    }

    function soundGameOver() {
      playTone(523, 0.10, 'triangle', 0.04, 659);
      setTimeout(() => playTone(659, 0.10, 'triangle', 0.04, 784), 90);
      setTimeout(() => playTone(784, 0.14, 'triangle', 0.045, 988), 180);
    }

    const scoreValue = document.getElementById('scoreValue');
    const timeValue = document.getElementById('timeValue');
    const comboValue = document.getElementById('comboValue');
    const comboTimerValue = document.getElementById('comboTimerValue');
    const questionText = document.getElementById('questionText');
    const feedbackText = document.getElementById('feedbackText');
    const arena = document.getElementById('arena');
    const startOverlay = document.getElementById('startOverlay');
    const resultOverlay = document.getElementById('resultOverlay');

    const startBtn = document.getElementById('startBtn');
    const retryBtn = document.getElementById('retryBtn');
    const startOverlayBtn = document.getElementById('startOverlayBtn');
    const playAgainBtn = document.getElementById('playAgainBtn');

    const finalScore = document.getElementById('finalScore');
    const finalAccuracy = document.getElementById('finalAccuracy');
    const finalCorrect = document.getElementById('finalCorrect');
    const finalMaxCombo = document.getElementById('finalMaxCombo');

    const GAME = {
      lastCountdownBeepSecond: null,
      running: false,
      score: 0,
      timeLeft: 60,
      combo: 0,
      maxCombo: 0,
      correctCount: 0,
      attemptCount: 0,
      currentQuestion: null,
      comboDeadline: null,
      questionLocked: false,
      tickTimer: null,
      animTimer: null,
      balloons: []
    };

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function pickQuestion() {
      return words[Math.floor(Math.random() * words.length)];
    }

    function getDistractors(correctEn, count = 8) {
      return shuffle(words.filter(w => w.en !== correctEn)).slice(0, count).map(w => w.en);
    }

    function getMultiplier(combo) {
      if (combo >= 10) return 3;
      if (combo >= 5) return 2;
      if (combo >= 3) return 1.5;
      return 1;
    }

    function updateHud() {
      scoreValue.textContent = Math.round(GAME.score);
      timeValue.textContent = Math.max(0, GAME.timeLeft).toFixed(1);
      comboValue.textContent = `x${GAME.combo}`;

      if (GAME.comboDeadline && GAME.running) {
        const remain = Math.max(0, (GAME.comboDeadline - performance.now()) / 1000);
        comboTimerValue.textContent = remain > 0 ? `${remain.toFixed(1)}s` : '0.0s';
      } else {
        comboTimerValue.textContent = '-';
      }
    }

    function setFeedback(text, mode = '') {
      feedbackText.textContent = text;
      feedbackText.className = `feedback ${mode}`.trim();
    }

    function clearArena() {
      arena.innerHTML = '';
      GAME.balloons = [];
    }

    function createBalloon(text, type, index, total) {
      const btn = document.createElement('button');
      btn.className = `balloon ${type === 'bomb' ? 'bomb' : ''}`;
      btn.textContent = type === 'bomb' ? '💣' : text;
      btn.dataset.type = type;
      btn.dataset.value = text;

      const arenaRect = arena.getBoundingClientRect();
      const cols = 3;
      const rows = Math.ceil(total / cols);
      const col = index % cols;
      const row = Math.floor(index / cols);
      const cellW = arenaRect.width / cols;
      const cellH = arenaRect.height / Math.max(rows, 3);

      const baseX = col * cellW + cellW / 2;
      const baseY = row * cellH + cellH / 2;

      const dx = (Math.random() - 0.5) * Math.min(40, cellW * 0.35);
      const dy = (Math.random() - 0.5) * Math.min(36, cellH * 0.35);

      const x = Math.max(14, Math.min(arenaRect.width - 110, baseX - 50 + dx));
      const y = Math.max(14, Math.min(arenaRect.height - 60, baseY - 26 + dy));

      btn.style.left = `${x}px`;
      btn.style.top = `${y}px`;

      const speedX = (Math.random() * 0.5 + 0.25) * (Math.random() < 0.5 ? -1 : 1);
      const speedY = (Math.random() * 0.35 + 0.15) * (Math.random() < 0.5 ? -1 : 1);

      const balloonObj = { el: btn, x, y, vx: speedX, vy: speedY, w: 110, h: 56 };
      GAME.balloons.push(balloonObj);

      btn.addEventListener('click', () => handleTap(btn));
      arena.appendChild(btn);
    }

    function renderQuestion() {
      clearArena();
      GAME.currentQuestion = pickQuestion();
      questionText.textContent = GAME.currentQuestion.jp;
      GAME.questionLocked = false;
      GAME.lastCountdownBeepSecond = null;

      const choices = shuffle([
        GAME.currentQuestion.en,
        ...getDistractors(GAME.currentQuestion.en, 8),
        '__BOMB__'
      ]);

      choices.forEach((choice, index) => {
        const type = choice === '__BOMB__' ? 'bomb' : (choice === GAME.currentQuestion.en ? 'correct' : 'wrong');
        createBalloon(choice, type, index, choices.length);
      });
    }

    function handleComboOnCorrect(now) {
      if (GAME.comboDeadline && now <= GAME.comboDeadline) {
        GAME.combo += 1;
      } else {
        GAME.combo = 1;
      }
      GAME.comboDeadline = now + 3000;
      if (GAME.combo > GAME.maxCombo) GAME.maxCombo = GAME.combo;
    }

    function handleTap(button) {
      if (!GAME.running || GAME.questionLocked) return;
      GAME.questionLocked = true;
      GAME.attemptCount += 1;

      const now = performance.now();
      const type = button.dataset.type;

      if (type === 'correct') {
        ensureAudio();
        GAME.correctCount += 1;
        handleComboOnCorrect(now);
        const gained = 10 * getMultiplier(GAME.combo);
        GAME.score += gained;
        GAME.timeLeft += 2;
        button.classList.add('correct-flash');
        setFeedback(`Nice! +${gained}点 / Combo x${GAME.combo}`, 'good');
        soundCorrect();
        soundCombo(GAME.combo);
      } else if (type === 'bomb') {
        ensureAudio();
        GAME.combo = 0;
        GAME.comboDeadline = null;
        GAME.score = Math.max(0, GAME.score - 20);
        GAME.timeLeft = Math.max(0, GAME.timeLeft - 5);
        button.classList.add('wrong-flash');
        setFeedback('💣 Bomb! -20点 / -5秒', 'warn');
        soundBomb();
      } else {
        ensureAudio();
        GAME.combo = 0;
        GAME.comboDeadline = null;
        GAME.score = Math.max(0, GAME.score - 5);
        GAME.timeLeft = Math.max(0, GAME.timeLeft - 3);
        button.classList.add('wrong-flash');
        setFeedback('Miss! -5点 / -3秒', 'bad');
        soundWrong();
      }

      updateHud();
      setTimeout(() => {
        if (!GAME.running) return;
        renderQuestion();
      }, 220);
    }

    function tick() {
      if (!GAME.running) return;

      GAME.timeLeft -= 0.1;

      if (GAME.comboDeadline && performance.now() > GAME.comboDeadline) {
        GAME.combo = 0;
        GAME.comboDeadline = null;
      }

      const countdownSecond = Math.ceil(GAME.timeLeft);
      if (GAME.timeLeft <= 10 && countdownSecond > 0 && GAME.lastCountdownBeepSecond !== countdownSecond) {
        GAME.lastCountdownBeepSecond = countdownSecond;
        ensureAudio();
        soundCountdown();
      }

      if (GAME.timeLeft <= 0) {
        GAME.timeLeft = 0;
        endGame();
        return;
      }

      updateHud();
    }

    function animateBalloons() {
      if (!GAME.running) return;
    }

    function startGame() {
      ensureAudio();
      GAME.running = true;
      GAME.score = 0;
      GAME.timeLeft = 60;
      GAME.combo = 0;
      GAME.maxCombo = 0;
      GAME.correctCount = 0;
      GAME.attemptCount = 0;
      GAME.comboDeadline = null;
      GAME.questionLocked = false;
      startOverlay.classList.add('hidden');
      resultOverlay.classList.add('hidden');
      setFeedback('3秒以内の連続正解でコンボ継続', '');
      renderQuestion();
      updateHud();

      clearInterval(GAME.tickTimer);
      cancelAnimationFrame(GAME.animTimer);
      GAME.tickTimer = setInterval(tick, 100);
      
    }

    function endGame() {
      ensureAudio();
      GAME.running = false;
      clearInterval(GAME.tickTimer);
      cancelAnimationFrame(GAME.animTimer);
      GAME.comboDeadline = null;
      updateHud();
      questionText.textContent = '終了！';
      setFeedback('おつかれさま。結果を確認しよう。');
      soundGameOver();

      const accuracy = GAME.attemptCount ? Math.round((GAME.correctCount / GAME.attemptCount) * 100) : 0;
      const bonusScore = GAME.score + GAME.maxCombo * 5 + Math.round(GAME.timeLeft) * 2;

      finalScore.textContent = Math.round(bonusScore);
      finalAccuracy.textContent = `${accuracy}%`;
      finalCorrect.textContent = GAME.correctCount;
      finalMaxCombo.textContent = GAME.maxCombo;
      resultOverlay.classList.remove('hidden');
    }

    startBtn.addEventListener('click', startGame);
    retryBtn.addEventListener('click', startGame);
    startOverlayBtn.addEventListener('click', startGame);
    playAgainBtn.addEventListener('click', startGame);

    window.addEventListener('resize', () => {
      if (GAME.running) {
        renderQuestion();
      }
    });
  </script>
