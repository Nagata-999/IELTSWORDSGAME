<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>IELTS / シス単 Speed Vocab Game</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --panel: rgba(255,255,255,0.10);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --good: #22c55e;
      --bad: #ef4444;
      --warn: #f59e0b;
      --shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1d4ed8 0%, var(--bg1) 45%, #020617 100%);
      color: var(--text);
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    .app {
      position: relative;
      width: 100%;
      max-width: 520px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 10px;
    }

    .panel {
      background: var(--panel);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .topbar {
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .stat {
      background: rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 10px 8px;
      text-align: center;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
    }

    .combo-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4px;
      gap: 8px;
      margin-top: 6px;
      font-size: 14px;
      color: var(--muted);
    }

    .combo-value {
      color: #fef08a;
      font-weight: 700;
    }

    .mode-badge {
      display: inline-block;
      min-width: 74px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.02em;
      color: #082f49;
      background: linear-gradient(180deg, #e0f2fe 0%, #7dd3fc 100%);
    }

    .question-card {
      padding: 16px 14px;
      text-align: center;
    }

    .question-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .question-text {
      font-size: clamp(26px, 6vw, 38px);
      font-weight: 900;
      letter-spacing: 0.02em;
      min-height: 48px;
    }

    .feedback {
      min-height: 24px;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      color: var(--muted);
    }

    .feedback.good { color: #bbf7d0; }
    .feedback.bad { color: #fecaca; }
    .feedback.warn { color: #fde68a; }

    .arena {
      position: relative;
      flex: 1;
      min-height: 320px;
      overflow: hidden;
      padding: 8px;
    }

    .balloon {
      position: absolute;
      border: none;
      border-radius: 999px;
      padding: 20px 24px;
      min-width: 130px;
      max-width: 60vw;
      font-size: 22px;
      font-weight: 800;
      color: #082f49;
      background: linear-gradient(180deg, #e0f2fe 0%, #7dd3fc 100%);
      box-shadow: 0 10px 20px rgba(14,165,233,0.25);
      cursor: pointer;
      transform: translate3d(0,0,0);
      transition: transform 0.08s ease, filter 0.15s ease, opacity 0.15s ease;
      user-select: none;
      touch-action: manipulation;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .balloon:active {
      transform: scale(0.96);
    }

    .balloon.correct-flash {
      background: linear-gradient(180deg, #dcfce7 0%, #4ade80 100%);
      color: #14532d;
    }

    .balloon.wrong-flash {
      background: linear-gradient(180deg, #fee2e2 0%, #f87171 100%);
      color: #7f1d1d;
    }

    .balloon.bomb {
      background: linear-gradient(180deg, #ffe4e6 0%, #fb7185 100%);
      color: #881337;
      box-shadow: 0 10px 20px rgba(244,63,94,0.25);
    }

    .balloon.pop-out {
      animation: popOut 0.22s ease-out forwards;
    }

    .balloon.deflate-fall {
      animation: deflateFall 0.55s ease-in forwards;
    }

    .bottom {
      padding: 12px;
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 800;
      color: white;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    .btn.primary {
      background: linear-gradient(180deg, #2563eb 0%, #1d4ed8 100%);
    }

    .btn.secondary {
      background: linear-gradient(180deg, #475569 0%, #334155 100%);
    }

    .btn.green {
      background: linear-gradient(180deg, #16a34a 0%, #15803d 100%);
    }

    .btn.orange {
      background: linear-gradient(180deg, #f97316 0%, #ea580c 100%);
    }

    .btn.gold {
      background: linear-gradient(180deg, #eab308 0%, #ca8a04 100%);
      color: #1f2937;
    }

    .menu-btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 14px;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(2,6,23,0.72);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 30;
    }

    .modal {
      width: min(100%, 420px);
      max-height: 90dvh;
      overflow-y: auto;
      padding: 20px;
      border-radius: 22px;
      background: rgba(15,23,42,0.88);
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .modal h1, .modal h2, .modal h3 {
      margin: 0 0 10px;
    }

    .modal p {
      color: var(--muted);
      line-height: 1.55;
      margin: 8px 0;
    }

    .result-grid {
      margin: 14px 0 18px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .result-box {
      padding: 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
    }

    .result-box .k {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .result-box .v {
      font-size: 24px;
      font-weight: 900;
    }

    .small {
      font-size: 13px;
      color: var(--muted);
    }

    .hidden {
      display: none !important;
    }

    .combo-popup {
      position: absolute;
      top: 48%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.7);
      font-size: clamp(44px, 10vw, 72px);
      font-weight: 1000;
      letter-spacing: 0.04em;
      line-height: 1;
      white-space: nowrap;
      pointer-events: none;
      z-index: 22;
      opacity: 0;
      color: #fff8c5;
      -webkit-text-stroke: 2px rgba(120, 53, 15, 0.9);
      text-shadow:
        0 0 10px rgba(255,255,255,0.35),
        0 0 24px rgba(250,204,21,0.65),
        0 6px 0 rgba(146,64,14,0.95),
        0 12px 18px rgba(0,0,0,0.45);
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .combo-popup.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.15);
      animation: comboPop 0.32s ease;
    }

    .flash-effect {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(255,255,255,0.95) 0%, rgba(255,245,157,0.75) 30%, rgba(255,255,255,0) 70%);
      opacity: 0;
      pointer-events: none;
      z-index: 18;
    }

    .flash-effect.active {
      animation: flashAnim 0.28s ease;
    }

    .pop-burst {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 25;
    }

    .pop-particle {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, #ffffff 0%, #7dd3fc 55%, #38bdf8 100%);
      opacity: 0.95;
      animation: burstFly 0.5s ease-out forwards;
    }

    .ranking-box {
      margin-top: 14px;
      padding: 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      text-align: left;
    }

    .ranking-title {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 8px;
      color: #fef08a;
      text-align: center;
    }

    .ranking-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .ranking-tab {
      flex: 1;
      min-width: 90px;
      border: none;
      border-radius: 10px;
      padding: 10px 8px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      color: white;
      background: rgba(255,255,255,0.12);
    }

    .ranking-tab.active {
      background: linear-gradient(180deg, #2563eb 0%, #1d4ed8 100%);
    }

    .ranking-row {
      display: grid;
      grid-template-columns: 34px 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 8px 4px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 14px;
    }

    .ranking-row:last-child {
      border-bottom: none;
    }

    .ranking-row.rich {
      align-items: start;
    }

    .ranking-rank {
      font-weight: 900;
      color: #93c5fd;
    }

    .ranking-main {
      min-width: 0;
    }

    .ranking-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 800;
    }

    .ranking-sub {
      margin-top: 3px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.3;
    }

    .ranking-score {
      font-weight: 900;
      color: #f8fafc;
      font-size: 18px;
    }

    .ranking-empty {
      text-align: center;
      color: var(--muted);
      padding: 8px 0;
      font-size: 14px;
    }

    .status-line {
      margin-top: 8px;
      min-height: 18px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }

    @keyframes comboPop {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.4) rotate(-6deg);
      }
      60% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.28) rotate(2deg);
      }
      100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.15) rotate(0deg);
      }
    }

    @keyframes flashAnim {
      0% { opacity: 0.95; }
      100% { opacity: 0; }
    }

    @keyframes burstFly {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(var(--dx), var(--dy)) scale(0.35);
        opacity: 0;
      }
    }

    @keyframes popOut {
      0% {
        transform: scale(1);
        opacity: 1;
        filter: brightness(1.1);
      }
      60% {
        transform: scale(1.18);
        opacity: 1;
        filter: brightness(1.25);
      }
      100% {
        transform: scale(0.2);
        opacity: 0;
        filter: brightness(1.4);
      }
    }

    @keyframes deflateFall {
      0% {
        transform: scale(1, 1) translateY(0) rotate(0deg);
        opacity: 1;
      }
      25% {
        transform: scale(0.92, 1.02) translateY(4px) rotate(-4deg);
        opacity: 1;
      }
      55% {
        transform: scale(0.72, 1.06) translateY(26px) rotate(6deg);
        opacity: 0.9;
      }
      100% {
        transform: scale(0.48, 1.12) translateY(110px) rotate(12deg);
        opacity: 0;
      }
    }

    @media (max-width: 420px) {
      .app { padding: 10px; gap: 8px; }
      .topbar { grid-template-columns: repeat(2, 1fr); }
      .balloon {
        font-size: 18px;
        padding: 16px 18px;
        min-width: 118px;
        max-width: 64vw;
      }
      .question-text { font-size: 28px; }
      .stat-value { font-size: 20px; }
      .combo-popup {
        font-size: 42px;
        -webkit-text-stroke: 1.5px rgba(120, 53, 15, 0.9);
      }
      .ranking-row {
        grid-template-columns: 28px 1fr auto;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel topbar">
      <div>
        <div class="stat">

        </div>

          <div class="stat-value" id="comboValue">x0</div>

    </div>

    <div class="panel question-card">

      <div class="question-text" id="questionText">準備OK？</div>
    </div>

    <div class="feedback" id="feedbackText">モードを選んでスタート</div>

    <div class="panel arena" id="arena"></div>

    <div id="flashEffect" class="flash-effect"></div>
    <div id="comboPopup" class="combo-popup">2 COMBO!</div>

    <div class="panel bottom">
      <button class="btn primary" id="menuBtn">Menu</button>
      <button class="btn secondary" id="retryBtn">Retry</button>
    </div>

    <div class="overlay" id="menuOverlay">
      <div class="modal">
        <h1>やすし英単語</h1>
        <p>スコアで平常点↑↑、やすし超えは賞品</p>
        <div class="menu-btns">
          <button class="btn primary" id="startIeltsBtn">IELTS モード開始</button>
          <button class="btn green" id="startSystan3Btn">シス単 3章 モード開始</button>
          <button class="btn orange" id="startSystan4Btn">シス単 4章 モード開始</button>
          <button class="btn gold" id="openRankingBtn">ランキング確認</button>
        </div>
        <p class="small" style="margin-top:12px;">同じ名前なら、そのモード内でハイスコアだけ残します。</p>
      </div>
    </div>

    <div class="overlay hidden" id="rankingOverlay">
      <div class="modal">
        <h2>Ranking</h2>
        <div class="ranking-tabs">
          <button class="ranking-tab active" id="rankingTabIelts">IELTS</button>
          <button class="ranking-tab" id="rankingTabSystan3">シス単3章</button>
          <button class="ranking-tab" id="rankingTabSystan4">シス単4章</button>
        </div>
        <div id="rankingScreenList" class="ranking-box">
          <div class="ranking-title">🏆 Ranking</div>
          <div class="ranking-empty">読み込み中...</div>
        </div>
        <div class="status-line" id="rankingStatus"></div>
        <div style="margin-top:16px; display:flex; gap:10px;">
          <button class="btn secondary" id="closeRankingBtn">戻る</button>
        </div>
      </div>
    </div>

    <div class="overlay hidden" id="resultOverlay">
      <div class="modal">
        <h2>Time Up!</h2>
        <div class="result-grid">
          <div class="result-box">
            <div class="k">Final Score</div>
            <div class="v" id="finalScore">0</div>
          </div>
          <div class="result-box">
            <div class="k">Accuracy</div>
            <div class="v" id="finalAccuracy">0%</div>
          </div>
          <div class="result-box">
            <div class="k">Correct</div>
            <div class="v" id="finalCorrect">0</div>
          </div>
          <div class="result-box">
            <div class="k">Max Combo</div>
            <div class="v" id="finalMaxCombo">0</div>
          </div>
        </div>

        <div id="rankingList" class="ranking-box">
          <div class="ranking-title">🏆 Ranking</div>
          <div class="ranking-empty">まだスコアがありません</div>
        </div>

        <div class="status-line" id="saveStatus"></div>

        <div style="margin-top:16px; display:flex; gap:10px;">
          <button class="btn primary" id="playAgainBtn">もう一回</button>
          <button class="btn secondary" id="backToMenuBtn">Menu</button>
        </div>
      </div>
    </div>
  </div>

    const finalCorrect = document.getElementById('finalCorrect');
    const finalMaxCombo = document.getElementById('finalMaxCombo');

    const rankingList = document.getElementById('rankingList');
    const rankingScreenList = document.getElementById('rankingScreenList');
    const rankingStatus = document.getElementById('rankingStatus');
    const saveStatus = document.getElementById('saveStatus');

    const comboPopup = document.getElementById('comboPopup');
    const flashEffect = document.getElementById('flashEffect');

    const playAgainBtn = document.getElementById('playAgainBtn');
    const backToMenuBtn = document.getElementById('backToMenuBtn');

    const GAME = {
      lastCountdownBeepSecond: null,
      running: false,
      score: 0,
      timeLeft: 30,
      combo: 0,
      maxCombo: 0,
      correctCount: 0,
      attemptCount: 0,
      currentQuestion: null,
      comboDeadline: null,
      questionLocked: false,
      tickTimer: null,
      balloons: [],
      scoreSavedThisRound: false
    };

    function ensureAudio() {
      if (!audioCtx) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (Ctx) audioCtx = new Ctx();
      }
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    function playTone(freq, duration = 0.08, type = 'sine', volume = 0.04, slideTo = null) {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, now);
      if (slideTo) {
        osc.frequency.exponentialRampToValueAtTime(slideTo, now + duration);
      }
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(volume, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + duration + 0.02);
    }

    function soundCorrect() { playTone(740, 0.08, 'triangle', 0.05, 880); }
    function soundCombo(combo) {
      if (combo < 2) return;
      playTone(880, 0.06, 'triangle', 0.045, 1175);
      setTimeout(() => playTone(1175, 0.06, 'triangle', 0.04, 1480), 55);
    }
    function soundWrong() { playTone(220, 0.12, 'sawtooth', 0.04, 160); }
    function soundBomb() {
      playTone(180, 0.16, 'square', 0.05, 80);
      setTimeout(() => playTone(120, 0.18, 'sawtooth', 0.04, 60), 70);
    }
    function soundCountdown() { playTone(980, 0.05, 'square', 0.025); }
    function soundGameOver() {
      playTone(523, 0.10, 'triangle', 0.04, 659);
      setTimeout(() => playTone(659, 0.10, 'triangle', 0.04, 784), 90);
      setTimeout(() => playTone(784, 0.14, 'triangle', 0.045, 988), 180);
    }

    function getWords(mode = currentMode) {
      if (mode === "systan3") return SYSTAN3_WORDS;
      if (mode === "systan4") return SYSTAN4_WORDS;
      return IELTS_WORDS;
    }

    function getModeLabel(mode = currentMode) {
      if (mode === "systan3") return "シス単3章";
      if (mode === "systan4") return "シス単4章";
      return "IELTS";
    }

    function updateModeBadge() {
      modeBadge.textContent = getModeLabel();
    }

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function pickQuestion() {
      const words = getWords();
      return words[Math.floor(Math.random() * words.length)];
    }

    function getDistractors(correctEn, count = 6) {
      const words = getWords();
      return shuffle(words.filter(w => w.en !== correctEn)).slice(0, count).map(w => w.en);
    }

    function getMultiplier(combo) {
      if (combo >= 10) return 3;
      if (combo >= 5) return 2;
      if (combo >= 3) return 1.5;
      return 1;
    }

    function updateHud() {
      scoreValue.textContent = Math.round(GAME.score);
      timeValue.textContent = Math.max(0, GAME.timeLeft).toFixed(1);
      comboValue.textContent = `x${GAME.combo}`;
      updateModeBadge();

      if (GAME.comboDeadline && GAME.running) {
        const remain = Math.max(0, (GAME.comboDeadline - performance.now()) / 1000);
        comboTimerValue.textContent = remain > 0 ? `${remain.toFixed(1)}s` : '0.0s';
      } else {
        comboTimerValue.textContent = '-';
      }
    }

    function setFeedback(text, mode = '') {
      feedbackText.textContent = text;
      feedbackText.className = `feedback ${mode}`.trim();
    }

    function clearArena() {
      arena.innerHTML = '';
      GAME.balloons = [];
    }

    function showComboPopup(combo) {
      comboPopup.classList.remove('show');
      if (combo < 2) {
        comboPopup.style.opacity = '0';
        return;
      }
      comboPopup.textContent = `${combo} COMBO!`;
      void comboPopup.offsetWidth;
      comboPopup.classList.add('show');
    }

    function triggerFlash() {
      flashEffect.classList.remove('active');
      void flashEffect.offsetWidth;
      flashEffect.classList.add('active');
    }

    function createBurstEffect(targetEl) {
      const rect = targetEl.getBoundingClientRect();
      const arenaRect = arena.getBoundingClientRect();
      const burst = document.createElement('div');
      burst.className = 'pop-burst';

      const cx = rect.left - arenaRect.left + rect.width / 2;
      const cy = rect.top - arenaRect.top + rect.height / 2;

      for (let i = 0; i < 10; i++) {
        const p = document.createElement('div');
        p.className = 'pop-particle';
        p.style.left = `${cx}px`;
        p.style.top = `${cy}px`;

        const angle = (Math.PI * 2 * i) / 10 + Math.random() * 0.35;
        const dist = 35 + Math.random() * 40;
        const dx = Math.cos(angle) * dist;
        const dy = Math.sin(angle) * dist;

        p.style.setProperty('--dx', `${dx}px`);
        p.style.setProperty('--dy', `${dy}px`);
        burst.appendChild(p);
      }

      arena.appendChild(burst);
      setTimeout(() => burst.remove(), 520);
    }

    function playCorrectEffect(button) {
      createBurstEffect(button);
      button.classList.add('pop-out');
    }

    function playWrongEffect(button) {
      button.classList.add('deflate-fall');
    }

    function removeBalloon(button) {
      GAME.balloons = GAME.balloons.filter(b => b.el !== button);
      setTimeout(() => {
        if (button && button.parentNode) button.remove();
      }, 520);
    }

    function createBalloon(text, type, index, total) {
      const btn = document.createElement('button');
      btn.className = `balloon ${type === 'bomb' ? 'bomb' : ''}`;
      btn.textContent = type === 'bomb' ? '💣' : text;
      btn.dataset.type = type;
      btn.dataset.value = text;

      arena.appendChild(btn);

      const arenaRect = arena.getBoundingClientRect();
      const btnRect = btn.getBoundingClientRect();
      const padding = 12;
      const gap = 14;
      const balloonW = Math.ceil(btnRect.width);
      const balloonH = Math.ceil(btnRect.height);

      const cols = 2;
      const rows = Math.ceil(total / cols);
      const col = index % cols;
      const row = Math.floor(index / cols);
      const cellW = arenaRect.width / cols;
      const cellH = arenaRect.height / Math.max(rows, 3);

      let minX = Math.max(padding, col * cellW + 6);
      let maxX = Math.min(arenaRect.width - balloonW - padding, (col + 1) * cellW - balloonW - 6);
      let minY = Math.max(padding, row * cellH + 6);
      let maxY = Math.min(arenaRect.height - balloonH - padding, (row + 1) * cellH - balloonH - 6);

      if (maxX < minX) { minX = Math.max(padding, Math.min(minX, arenaRect.width - balloonW - padding)); maxX = minX; }
      if (maxY < minY) { minY = Math.max(padding, Math.min(minY, arenaRect.height - balloonH - padding)); maxY = minY; }

      let x = minX;
      let y = minY;
      let placed = false;

      for (let attempt = 0; attempt < 60; attempt++) {
        const testX = minX + Math.random() * Math.max(0, maxX - minX);
        const testY = minY + Math.random() * Math.max(0, maxY - minY);

        const overlaps = GAME.balloons.some(b => {
          return !(
            testX + balloonW + gap < b.x ||
            testX > b.x + b.w + gap ||
            testY + balloonH + gap < b.y ||
            testY > b.y + b.h + gap
          );
        });

        if (!overlaps) {
          x = testX;
          y = testY;
          placed = true;
          break;
        }
      }

      if (!placed) {
        const fallbackX = col * cellW + (cellW - balloonW) / 2;
        const fallbackY = row * cellH + (cellH - balloonH) / 2;
        x = Math.max(padding, Math.min(arenaRect.width - balloonW - padding, fallbackX));
        y = Math.max(padding, Math.min(arenaRect.height - balloonH - padding, fallbackY));
      }

      btn.style.left = `${x}px`;
      btn.style.top = `${y}px`;

      const balloonObj = { el: btn, x, y, w: balloonW, h: balloonH };
      GAME.balloons.push(balloonObj);
      btn.addEventListener('click', () => handleTap(btn));
    }

    function renderQuestion() {
      clearArena();
      const words = getWords();

      if (!words.length) {
        questionText.textContent = "単語未設定";
        setFeedback(`${getModeLabel()} の単語を追加してください`, 'warn');
        return;
      }

      GAME.currentQuestion = pickQuestion();
      questionText.textContent = GAME.currentQuestion.jp;
      GAME.questionLocked = false;
      GAME.lastCountdownBeepSecond = null;

      const distractorCount = Math.min(6, Math.max(0, words.length - 1));
      const choices = shuffle([
        GAME.currentQuestion.en,
        ...getDistractors(GAME.currentQuestion.en, distractorCount),
        '__BOMB__'
      ]);

      choices.forEach((choice, index) => {
        const type = choice === '__BOMB__' ? 'bomb' : (choice === GAME.currentQuestion.en ? 'correct' : 'wrong');
        createBalloon(choice, type, index, choices.length);
      });
    }

    function handleComboOnCorrect(now) {
      if (GAME.comboDeadline && now <= GAME.comboDeadline) {
        GAME.combo += 1;
      } else {
        GAME.combo = 1;
      }
      GAME.comboDeadline = now + 5000;
      if (GAME.combo > GAME.maxCombo) GAME.maxCombo = GAME.combo;
      showComboPopup(GAME.combo);
      if (GAME.combo >= 5) triggerFlash();
    }

    function handleTap(button) {
      if (!GAME.running || GAME.questionLocked) return;

      const now = performance.now();
      const type = button.dataset.type;

      if (type === 'correct') {
        GAME.questionLocked = true;
        GAME.attemptCount += 1;
        ensureAudio();
        GAME.correctCount += 1;
        handleComboOnCorrect(now);

        const gained = 10 * getMultiplier(GAME.combo);
        GAME.score += gained;
        GAME.timeLeft += 2;

        button.classList.add('correct-flash');
        playCorrectEffect(button);
        setFeedback(`Nice! +${gained}点 / Combo x${GAME.combo}`, 'good');
        soundCorrect();
        soundCombo(GAME.combo);
        updateHud();

        setTimeout(() => {
          if (!GAME.running) return;
          renderQuestion();
        }, 420);

      } else if (type === 'bomb') {
        GAME.attemptCount += 1;
        ensureAudio();
        GAME.combo = 0;
        GAME.comboDeadline = null;
        showComboPopup(0);

        GAME.score = Math.max(0, GAME.score - 20);
        GAME.timeLeft = Math.max(0, GAME.timeLeft - 5);

        button.classList.add('wrong-flash');
        playWrongEffect(button);
        setFeedback('💣 Bomb! -20点 / -5秒', 'warn');
        soundBomb();

        removeBalloon(button);
        updateHud();

      } else {
        GAME.attemptCount += 1;
        ensureAudio();
        GAME.combo = 0;
        GAME.comboDeadline = null;
        showComboPopup(0);

        GAME.score = Math.max(0, GAME.score - 5);
        GAME.timeLeft = Math.max(0, GAME.timeLeft - 3);

        button.classList.add('wrong-flash');
        playWrongEffect(button);
        setFeedback('Miss! -5点 / -3秒', 'bad');
        soundWrong();

        removeBalloon(button);
        updateHud();
      }
    }

    function tick() {
      if (!GAME.running) return;

      GAME.timeLeft -= 0.1;

      if (GAME.comboDeadline && performance.now() > GAME.comboDeadline) {
        GAME.combo = 0;
        GAME.comboDeadline = null;
        showComboPopup(0);
      }

      const countdownSecond = Math.ceil(GAME.timeLeft);
      if (GAME.timeLeft <= 10 && countdownSecond > 0 && GAME.lastCountdownBeepSecond !== countdownSecond) {
        GAME.lastCountdownBeepSecond = countdownSecond;
        ensureAudio();
        soundCountdown();
      }

      if (GAME.timeLeft <= 0) {
        GAME.timeLeft = 0;
        endGame();
        return;
      }

      updateHud();
    }

    function startGame(mode) {
      currentMode = mode;
      ensureAudio();
      GAME.running = true;
      GAME.score = 0;
      GAME.timeLeft = 30;
      GAME.combo = 0;
      GAME.maxCombo = 0;
      GAME.correctCount = 0;
      GAME.attemptCount = 0;
      GAME.comboDeadline = null;
      GAME.questionLocked = false;
      GAME.lastCountdownBeepSecond = null;
      GAME.scoreSavedThisRound = false;
      showComboPopup(0);
      saveStatus.textContent = "";

      menuOverlay.classList.add('hidden');
      rankingOverlay.classList.add('hidden');
      resultOverlay.classList.add('hidden');

      setFeedback(`${getModeLabel()} モード開始`, '');
      renderQuestion();
      updateHud();

      clearInterval(GAME.tickTimer);
      GAME.tickTimer = setInterval(tick, 100);
    }

    function backToMenu() {
      GAME.running = false;
      clearInterval(GAME.tickTimer);
      showComboPopup(0);
      menuOverlay.classList.remove('hidden');
      rankingOverlay.classList.add('hidden');
      resultOverlay.classList.add('hidden');
      clearArena();
      questionText.textContent = '準備OK？';
      setFeedback('モードを選んでスタート');
      updateHud();
    }

    function renderRanking(container, data, mode) {
      if (!container) return;
      const title = `<div class="ranking-title">🏆 ${getModeLabel(mode)} Ranking</div>`;

      if (!data || data.length === 0) {
        container.innerHTML = title + `<div class="ranking-empty">まだスコアがありません</div>`;
        return;
      }

      const rows = data.map((d, i) => `
        <div class="ranking-row rich">
          <div class="ranking-rank">${i + 1}.</div>
          <div class="ranking-main">
            <div class="ranking-name">${escapeHtml(d.player_name || "NO NAME")}</div>
            <div class="ranking-sub">
              Combo: ${Number(d.max_combo ?? 0)} / Acc: ${Number(d.accuracy ?? 0)}%
            </div>
          </div>
          <div class="ranking-score">${Number(d.score ?? 0)}</div>
        </div>
      `).join("");

      container.innerHTML = title + rows;
    }

    function dedupeRanking(rows) {
      const bestMap = new Map();

      rows.forEach(row => {
        const key = `${(row.player_name || "NO NAME").trim()}__${row.mode || ""}`;
        const score = Number(row.score || 0);
        const prev = bestMap.get(key);

        if (!prev || score > Number(prev.score || 0)) {
          bestMap.set(key, row);
        }
      });

      return [...bestMap.values()]
        .sort((a, b) => Number(b.score || 0) - Number(a.score || 0))
        .slice(0, 10);
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setRankingTabUI() {
      rankingTabIelts.classList.toggle("active", rankingMode === "ielts");
      rankingTabSystan3.classList.toggle("active", rankingMode === "systan3");
      rankingTabSystan4.classList.toggle("active", rankingMode === "systan4");
    }

    async function loadRanking(mode = currentMode, target = rankingList) {
      if (!supabaseClient) {
        renderRanking(target, [], mode);
        return [];
      }

      const { data, error } = await supabaseClient
        .from("scores")
        .select("id, player_name, score, max_combo, accuracy, mode")
        .eq("mode", mode)
        .order("score", { ascending: false })
        .limit(200);

      if (error) {
        console.error("ranking load error:", error);
        if (target === rankingScreenList) rankingStatus.textContent = "ランキング取得失敗";
        renderRanking(target, [], mode);
        return [];
      }

      const deduped = dedupeRanking(data || []);
      renderRanking(target, deduped, mode);

      if (target === rankingScreenList) {
        rankingStatus.textContent = `${getModeLabel(mode)} の上位 ${deduped.length} 件`;
      }
      return deduped;
    }

    async function openRankingScreen(mode = "ielts") {
      rankingMode = mode;
      setRankingTabUI();
      rankingStatus.textContent = "読み込み中...";
      menuOverlay.classList.add('hidden');
      resultOverlay.classList.add('hidden');
      rankingOverlay.classList.remove('hidden');
      await loadRanking(rankingMode, rankingScreenList);
    }

    async function saveHighScore(finalScoreValue, accuracy) {
      if (!supabaseClient || GAME.scoreSavedThisRound) return;

      const input = prompt("名前を入力してください", localStorage.getItem("speed_vocab_name") || "");
      if (input === null) {
        saveStatus.textContent = "保存をスキップしました";
        await loadRanking(currentMode, rankingList);
        return;
      }

      const playerName = (input.trim() || "NO NAME").slice(0, 20);
      localStorage.setItem("speed_vocab_name", playerName);
      saveStatus.textContent = "保存中...";

      const { error } = await supabaseClient.rpc("save_high_score", {
        p_player_name: playerName,
        p_score: finalScoreValue,
        p_max_combo: GAME.maxCombo,
        p_accuracy: accuracy,
        p_mode: currentMode
      });

      if (error) {
        console.error("save error:", error);
        saveStatus.textContent = "保存失敗: " + error.message;
      } else {
        GAME.scoreSavedThisRound = true;
        saveStatus.textContent = `${playerName} の記録を保存しました`;
      }
    }

    async function endGame() {
      ensureAudio();
      GAME.running = false;
      clearInterval(GAME.tickTimer);
      GAME.comboDeadline = null;
      showComboPopup(0);
      updateHud();
      questionText.textContent = '終了！';
      setFeedback('おつかれさま。結果を確認しよう。');
      soundGameOver();

      const accuracy = GAME.attemptCount
        ? Math.round((GAME.correctCount / GAME.attemptCount) * 100)
        : 0;
      const bonusScore = Math.round(
        GAME.score + GAME.maxCombo * 5 + Math.round(GAME.timeLeft) * 2
      );

      finalScore.textContent = bonusScore;
      finalAccuracy.textContent = `${accuracy}%`;
      finalCorrect.textContent = GAME.correctCount;
      finalMaxCombo.textContent = GAME.maxCombo;
      resultOverlay.classList.remove('hidden');

      await saveHighScore(bonusScore, accuracy);
      await loadRanking(currentMode, rankingList);
    }

    startIeltsBtn.addEventListener('click', () => startGame("ielts"));
    startSystan3Btn.addEventListener('click', () => startGame("systan3"));
    startSystan4Btn.addEventListener('click', () => startGame("systan4"));

    playAgainBtn.addEventListener('click', () => startGame(currentMode));
    retryBtn.addEventListener('click', () => startGame(currentMode));

    menuBtn.addEventListener('click', backToMenu);
    backToMenuBtn.addEventListener('click', backToMenu);

    openRankingBtn.addEventListener('click', () => openRankingScreen("ielts"));
    closeRankingBtn.addEventListener('click', backToMenu);

    rankingTabIelts.addEventListener('click', () => openRankingScreen("ielts"));
    rankingTabSystan3.addEventListener('click', () => openRankingScreen("systan3"));
    rankingTabSystan4.addEventListener('click', () => openRankingScreen("systan4"));

    window.addEventListener('resize', () => {
      if (GAME.running) renderQuestion();
    });

    updateModeBadge();
    loadRanking("ielts", rankingScreenList);
  </script>
</body>
</html>
